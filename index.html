    { from: "boltzmann", to: "maxwell", note: "Boltzmann introduced external potential in 1868 to the Maxwell distribution that was established in 1860. This set the basis of the Boltzmann equation in 1872." },//(Sklar, Lawrence (1993). Physics and Chance: Philosophical Issues in the Foundations of Statistical Mechanics. New York: Cambridge University Press.)

    { from: "boltzmann", to: "planck", note: "'In doing so, Planck had to reject his belief that the second law of thermodynamics was an absolute law of nature, and accept Boltzmann's interpretation that it was a statistical law.' Planck borrowed Boltzmann's method to avoid ultraviolet catastrophe, which led to the idea of quantum. (Although Boltzmann fought for atoms, he considered discretization merely as a mathematical approach) Planck was also the first one to state the precise value the Boltzmann constant." },// Mac tutor.
    { from: "boltzmann", to: "einstein", note: "1905, Einstein's work on brownian motion became the proof of the existence of atoms; Einstein further discovered that Bose's method of counting applied not only to light but also to atoms, and that it produced a remarkable condensation phenomenon at low temperatures." },
    { from: "boltzmann", to: "lorentz", note: "Lorentz applied Boltzmann euqation to explore the electrons' behavior in conduction. (lorentz gas model)" },

    { from: "boltzmann", to: "schrodinger", note: "'Boltzmann's line of thought may be called my first love in science, No other has ever thus enraptured me or willever do so again'. Schrödinger's thesis advisor and director of the second Institute for Experimental Physics at the University of Vienna, Franz Serafin Exner, was an ardent admirer of Boltzmann." },// (Schrödinger, centenary celebration of a polymat,chapter 2)
    { from: "boltzmann", to: "meitner", note: "'A fairly typical curriculum, it was highly unusual in one respect: all of it was taught by just one person, the theoretical physicist Ludwig Boltzmann.'Meitner was a student of Boltzmann and was deeply influenced by his passionate personality. " },//(Lise Meitner : a life in physicsby Sime, Ruth Lewin)
    { from: "boltzmann", to: "dirac", note: "When Fermi and Dirac derived Fermi-Dirac statistics in 1926, they completely followed Boltzmann's combinatorial mathematical logic." },

    { from: "thomson", to: "oppenheimer", note: "Thomson accepted Oppenheimer for Cambridge under the condition of completing a basic laboratory course. There, Oppenheimer developed an antagonistic relationship with his tutor, Patrick Blackett, and left a poisoned apple on the table for Blackett." },
    { from: "rutherford", to: "bohr", note: "After being neglected by and failed to impress Thomson in 1911, Bohr received an invitation from Rutherford to conduct post-doctoral work at Victoria University of Manchester. In 1912, after Bohr returned to Denmark, he adapted Rutherford's nuclear structure to Max Planck's quantum theory and so created his Bohr model of the atom." },

    { from: "bohr", to: "meitner", note: "In 1938, Meitner went to the Danish consulate to apply for a travel visa, and was told that Denmark no longer recognized her Austrian passport. During Meitner's forced exodus from Germany, Bohr played a crucial role behind the scenes. He used his influence to contact colleagues in the Netherlands and Sweden, including Kramers, Coster, and Adriaan Fokker, who found Meitner a position and ensured she received entry permission. Meitner eventually secured an unpaid position at Leiden University in the Netherlands, as they did not pay salaries to foreigners." },

    { from: "einstein", to: "de_Broglie", note: "Paul Langevin, the reviewer of De Broglie's notes on the 'atom of light' in 1923, was skeptical about it and asked for Einstein's opinion. Einstein gave a middle-of-the-road response. Ultimately, the concept of 'an atom of light' did not appear in de Broglie's paper. De Broglie's 1924 thesis Research on the Theory of the Quanta, which introduced his theory of electron waves, was based on the work of Max Planck and Albert Einstein on light. Einstein supported his theory." },

    { from: "einstein", to: "meitner", note: "When Meitner and Frisch were discussing about fission on a tree trunk, Meitner used Einstein's theory to explain the energy of fission. They realized that the uranium nucleus, after being seperated into two drops, would be driven apart by their mutual electric repulsion and would acquire about 200 MeV in all. Lise Meitner worked out that the two nuclei formed by the division of a uranium nucleus together would be lighter than the original uranium nucleus by about one-fifth the mass of a proton. According to Einstein's formula $E = mc^2$, and one-fifth of a proton mass was just equivalent to 200 MeV. Furthermore, Einstein used to call Meitner 'Our Marie Curie'." },
    { from: "einstein", to: "pauli", note: "After reading Pauli's monograph on relativity, which he wrote when he was 21, Einstein remarked: 'Whoever studies this mature and grandly conceived work might not believe that its author is a twenty-one year old man.'" },
    { from: "bose", to: "kapitsa", note: "In 1937, Kapitsa observed the macroscopic quantum effect predicted by Bose in his laboratory: superfluidity." },
    { from: "bose", to: "landau", note: "Landau proposed that superfluids consist of two parts: a 'superfluid component' that is completely frictionless (corresponding to the part of Bose condensation) and a 'normal component' that carries heat." },
    { from: "bose", to: "dirac", note: "Dirac was the first person to name a particle that obeys Bose-Einstein statistics 'Boson' in honor of Bose's foundational contributions." },
    { from: "perrin", to: "de_Broglie", note: "Perrin presented De Broglie's first two notes which applied his relation to the photon considered as an 'atom of light' (atome de lumière). (Ondes et quanta, 1923; Quanta de lumière, diffraction et interférences, 1923) These would not have been easily accepted by other scientific journals." },
    { from: "de_Broglie", to: "schrodinger", note: "De Broglie's paper changed the direction of Schrödinger's research. On 3 November 1925 Schrödinger wrote to Einstein: 'A few days ago I read with great interest the ingenious thesis of Louis de Broglie,' and On 16 November, Schrödinger wrote: 'I have been intensely concerned these days with Louis de Broglie's ingenious theory. It is extraordinarily exciting, but still has some very grave difficulties.' Schrödinger gave a seminar on de Broglie's work a few weeks later. A member of the audience, a student of Sommerfeld's, suggested that there should be a wave equation. Within a few weeks Schrödinger had found his wave equation." },
    { from: "born", to: "heisenberg", note: "In 1926, Heisenberg returned to Göttingen and, with Max Born and Pascual Jordan over a period of about six months, developed the matrix mechanics formulation of quantum mechanics. " },
    { from: "born", to: "oppenheimer", note: "Born was the doctoral advisor of Oppenheimer in Göttingen in 1927. Oppenheimer and Born published a famous paper on the Born–Oppenheimer approximation, assuming that atomic nuclei are essentially fixed in place. Interestingly, although the two maintained a superficial peace, Oppenheimer felt that Born was a terrible egoist who complained all day about not getting enough recognition for his contributions to the development of quantum mechanics; while Born felt that Oppenheimer was outwardly humble but inwardly arrogant, and that being with him was more painful than being with anyone else." },
    { from: "born", to: "pauli", note: "Pauli was appointed to Göttingen as Born's assistant from October 1921." },
    { from: "born", to: "teller", note: "In 1930, Teller moved to the University of Göttingen, Teller left Göttingen through the aid of the International Rescue Committee in 1933." },//more information required
    { from: "born", to: "schrodinger", note: "Inspired by Schrödinger's wave function, Born proposed the famous probability amplitude interpretation. He pointed out that the wave function $\psi$ itself has no physical meaning, but its squared magnitude $|\psi|^2$ represents the probability density of a particle appearing at a certain location." },
    { from: "born", to: "dirac", note: "Dirac visited Göttingen and met Born there. The American physicist Raymond Birge observed that 'Dirac is the real master of the situation' because Born just sat and listened to him open-mouthed." },

    { from: "kapitsa", to: "dirac", note: "Kapitsa met Dirac in the Cavendish Laboratory, under Rutherford's supervision. Dirac attended Kapitsa's club and was a close friend of him." },
    { from: "pauli", to: "heisenberg", note: "Pauli and Heisenberg formulated the foundation of field theory together in 1929." },
    { from: "pauli", to: "dirac", note: "Dirac knew Pauli in Copenhagen. After Dirac proposed his equation in 1928, Pauli (and Heisenberg) started to work on the foundation of quantum field theory by interpreting the Dirac equation as a field equation. Personally, the two only managed to establish a fair relationship in Copenhagen, probably because Pauli's harshness sometimes hurt Dirac. " },//do we need that example here
    { from: "pauli", to: "fermi", note: "Fermi applied Pauli's exclusion principle to an ideal gas in 1925, which is the foundation of Fermi-Dirac statistics. Fermi also took up the idea that Pauli proposed: an uncharged particle is emitted in Beta decay, which was named as 'neutrino' by Fermi. Fermi constrcuted a model that incorporate this particle, now called weak interaction." },
    { from: "schrodinger", to: "heisenberg", note: "The debate between Schrödinger's wave mechanics and Heisenberg's matrix mechanics " },

    { from: "fermi", to: "wu", note: "In 1944, the first practical nuclear reactor ever built, the B reactor at the Hanford Site faced a problem: it started up and shutted down at certain intervals. Fermi (and John Wheeler) suspected this was because a fission product, Xe-135, absorbs neutrons. Segrè told Fermi to ask Wu as she had a PhD thesis on the radioactive isotopes of Xe in 1940 which had not been published at the time. Her paper verified that Xe-135 has an unexpectedly large neutron absorption cross-section, which caused the problem in reactor B." },
    { from: "fermi", to: "lee", note: "In 1946, Lee was selected by Fermi as his PhD student in the University of Chicago and received his PhD in 1950 for his work on Hydrogen Content of White Dwarf Stars. Lee's work motivated Fermi to return to astrophysics, and received Marcel Grossmann Awards in 2015 for this." },

/* spacing */
const mainGroup = document.getElementById('main-group');
const svg = document.getElementById('scene');

// 1. calculate the number of connections for each node
nodes.forEach(n => {
    n.degree = links.filter(l => l.from === n.id || l.to === n.id).length;
});

// 2. Initialize coordinates
nodes.forEach((node, i) => {
    const gCfg = groups[node.group];
    const centerX = 600; 
    
    // 4 per row to flatten the layout
    const col = i % 4;
    const row = Math.floor(i / 4);
    const nodeSpacingX = 180; 
    const nodeSpacingY = 85; 

    const pullingForce = (node.degree > 5) ? (centerX - gCfg.x) * 0.2 : 0;
    
    // Jitter
    const jitterX = (i % 2 === 0 ? 1 : -1) * 10;
    const jitterY = (i % 3 === 0 ? 1 : -1) * 5;

    node.x = gCfg.x + col * nodeSpacingX + pullingForce + jitterX;
    node.y = gCfg.y + row * nodeSpacingY + jitterY;
});
//legend
const sidebar = document.getElementById('sidebar');
const legendBox = document.createElement('div');
legendBox.className = 'legend';
legendBox.innerHTML = '<h3>Field Legend</h3>';

Object.keys(groups).forEach(key => {
    const g = groups[key];
    legendBox.innerHTML += `
        <div class="legend-item">
            <span class="color-dot" style="background:${g.color}"></span>
            <div>
                <strong>${g.label}</strong><br>
                <span style="color: var(--ink-soft); font-size: 0.7rem;">${g.desc || ''}</span>
            </div>
        </div>`;
});
sidebar.appendChild(legendBox);

// 3. number the lines
links.forEach((link, idx) => {
    const s = nodes.find(n => n.id === link.from);
    const t = nodes.find(n => n.id === link.to);
    if (!s || !t) return;
    
    const lineId = idx + 1; 
    link.lineNum = lineId; 

    // draw the lines
    const lEl = document.createElementNS("http://www.w3.org/2000/svg", "line");
    lEl.setAttribute("class", `link l-${link.from} l-${link.to}`);
    lEl.setAttribute("x1", s.x); lEl.setAttribute("y1", s.y);
    lEl.setAttribute("x2", t.x); lEl.setAttribute("y2", t.y);
    mainGroup.appendChild(lEl);

    // draw the number of the lines
    const midX = (s.x + t.x) / 2;
    const midY = (s.y + t.y) / 2;
    const tEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
    tEl.setAttribute("x", midX); tEl.setAttribute("y", midY);
    tEl.setAttribute("class", `link-num l-${link.from} l-${link.to}`);
    tEl.setAttribute("style", "font-size: 10px; fill: var(--accent); font-weight: bold; paint-order: stroke; stroke: #fff; stroke-width: 3px; pointer-events:none;");
    tEl.textContent = lineId;
    mainGroup.appendChild(tEl);
});

// 4. colour the nodes
nodes.forEach(node => {
    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.setAttribute("class", "node");
    const circ = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circ.setAttribute("cx", node.x); circ.setAttribute("cy", node.y); circ.setAttribute("r", 10);
    
    
    const groupColor = groups[node.group].color;
    circ.setAttribute("stroke", groupColor); 
    circ.setAttribute("stroke-width", "3"); 
    circ.setAttribute("fill", "white");     
    
    const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
    txt.setAttribute("x", node.x); txt.setAttribute("y", node.y + 25);
    txt.setAttribute("text-anchor", "middle"); txt.setAttribute("class", "node-text");
    txt.textContent = node.label;
    
    g.appendChild(circ); g.appendChild(txt);
    g.onclick = (e) => { e.stopPropagation(); clickNode(node); };
    mainGroup.appendChild(g);
});

/* user interface */
let scale = 1, tx = 0, ty = 0;
let isDragging = false, startX, startY;

const updateTransform = () => {
    mainGroup.setAttribute("transform", `translate(${tx},${ty}) scale(${scale})`);
};

function manualZoom(factor) {
    const oldScale = scale;
    scale *= factor;
    scale = Math.min(Math.max(scale, 0.2), 4); 

    const rect = svg.getBoundingClientRect();
    const cx = rect.width / 2;
    const cy = rect.height / 2;
    
    tx = cx - (cx - tx) * (scale / oldScale);
    ty = cy - (cy - ty) * (scale / oldScale);
    updateTransform();
}

svg.onmousedown = (e) => {
    if(e.button !== 0) return;
    isDragging = true;
    startX = e.clientX - tx;
    startY = e.clientY - ty;
};

window.onmousemove = (e) => {
    if (!isDragging) return;
    tx = e.clientX - startX;
    ty = e.clientY - startY;
    updateTransform();
};

window.onmouseup = () => isDragging = false;

// Reduce sensitivity
svg.onwheel = (e) => {
    e.preventDefault();
    const oldScale = scale;
    const delta = e.deltaY > 0 ? 0.96 : 1.04; 
    scale *= delta;
    scale = Math.min(Math.max(scale, 0.2), 4);

    const rect = svg.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    tx = mouseX - (mouseX - tx) * (scale / oldScale);
    ty = mouseY - (mouseY - ty) * (scale / oldScale);
    updateTransform();
};

function clickNode(node) {
    document.getElementById('sidebar').scrollTop = 0;
    document.getElementById('intro').style.display = 'none';
    const det = document.getElementById('details');
    det.style.display = 'block';
    document.getElementById('s-name').textContent = node.label;
    document.getElementById('s-bio').innerHTML = node.bio;

    // bolding the lines (when selected)
    document.querySelectorAll('.link').forEach(l => l.classList.remove('active'));
    document.querySelectorAll(`.l-${node.id}`).forEach(l => l.classList.add('active'));
    // 1. Clear the active state of all lines and numbers
    document.querySelectorAll('.link, .link-num').forEach(el => el.classList.remove('active'));
    
    // 2. Add activation status to lines and numbers related to current scientists
    document.querySelectorAll(`.l-${node.id}`).forEach(el => el.classList.add('active'));
    const rels = links.filter(l => l.from === node.id || l.to === node.id);
    
    
    const groupedRels = {};
    rels.forEach(r => {
        const otherId = r.from === node.id ? r.to : r.from;
        const otherNode = nodes.find(n => n.id === otherId);
        if (!otherNode) return;
        
        const gKey = otherNode.group;
        if (!groupedRels[gKey]) groupedRels[gKey] = [];
        groupedRels[gKey].push({ link: r, target: otherNode });
    });

    
    let html = '';
    for (const gKey in groupedRels) {
        const groupInfo = groups[gKey];
        const items = groupedRels[gKey];
        
        // grouping, in the left hand side
        html += `
            <div style="background: ${groupInfo.color}15; border-radius: 8px; padding: 12px; margin-bottom: 20px; border: 1px solid ${groupInfo.color}33;">
                <h4 style="margin: 0 0 10px 0; color: ${groupInfo.color}; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">
                    ${groupInfo.label}
                </h4>
        `;

        // Render the specific relationships within the frame
        html += items.map(item => `
            <div class="relation-box" style="background: white; margin-top: 8px; border-left: 3px solid ${groupInfo.color};">
                <small style="color:var(--ink-soft);">[Line #${item.link.lineNum}]</small><br>
                <strong>With ${item.target.label}:</strong><br>
                ${item.link.note}
            </div>
        `).join('');

        html += `</div>`; 
    }

    document.getElementById('s-links').innerHTML = html || '<p>No specific records found.</p>';

    if (window.MathJax && window.MathJax.typeset) {
        MathJax.typeset();
    }
}
</script>
